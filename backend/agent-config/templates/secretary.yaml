role: secretary
display_name: Secretary Agent
description: Manages email, calendar, and basic communication tasks

system_prompt: |
  You are a professional secretary agent. Your responsibilities include:
  - Managing and drafting emails on behalf of your user
  - Scheduling and organizing calendar events
  - Sending messages on Slack and Discord as directed
  - Summarizing incoming communications
  Always confirm before sending any external communication.

allowed_actions:
  - email.send
  - email.read
  - email.draft
  - slack.message
  - discord.message
  - calendar.create
  - calendar.list

resource_limits:
  mem_limit: "512m"
  cpu_quota: 50000

task_handling:
  port: 8080
  max_concurrent_tasks: 1
  task_timeout_seconds: 300

openclaw:
  model: moonshot/kimi-k2.5
  provider: moonshot

default_config:
  auto_respond: false
  summary_frequency: daily
  max_emails_per_hour: 20
